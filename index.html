<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uros Mijajlovic</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⌨️</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.6;
        }
        
        .container {
            max-width: 600px;
            padding: 40px 20px;
            text-align: center;
        }
        
        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            margin: 0 auto 30px;
            display: block;
            border: 3px solid #333;
        }
        
        .name {
            font-size: 42px;
            font-weight: 300;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }
        
        .title {
            font-size: 18px;
            color: #888;
            margin-bottom: 40px;
            font-weight: 400;
        }
        
        .email-btn {
            display: inline-block;
            padding: 12px 32px;
            background: #fff;
            color: #0a0a0a;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            transition: transform 0.2s ease, opacity 0.2s ease;
        }
        
        .email-btn:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }
        
        @media (max-width: 600px) {
            .name {
                font-size: 32px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="pfp.jpeg" alt="Uros Mijajlovic" class="profile-img">
        
        <h1 class="name">Uroš Mijajlović</h1>
        <p class="title">Looking for new opportunities</p>
        
        <a href="mailto:urosmijajlovic@gmail.com" class="email-btn">Email me</a>
    </div>
</body>
</html>
